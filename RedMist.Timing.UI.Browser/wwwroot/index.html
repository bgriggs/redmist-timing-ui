<!DOCTYPE html>
<html>

<head>
    <title>Red Mist Timing</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./app.css" />
</head>

<body style="margin: 0; overflow: hidden">
    <div id="out">
        <div class="avalonia-splash">
            <h2>
                Loading Red Mist Timing...
                <br />
                <img src="web_hi_res_1024.png" width="300" />
            </h2>
        </div>
    </div>
    <script>
      // Auto-update: fetch version.json (bypassing browser cache) on every load.
      // If the server version differs from the locally stored version, clear all
      // browser caches and force a fresh page load via a cache-busting redirect.
      (async function() {
        try {
          var params = new URLSearchParams(window.location.search);
          var vParam = params.get('_v');
          if (vParam) {
            console.log('[auto-update] Arrived via version redirect, storing version:', vParam);
            localStorage.setItem('app-version', vParam);
            params.delete('_v');
            var clean = window.location.pathname +
              (params.toString() ? '?' + params.toString() : '') +
              window.location.hash;
            history.replaceState(null, '', clean);
            return;
          }
          console.log('[auto-update] Checking for new version...');
          var resp = await fetch('./version.json', { cache: 'no-store' });
          if (!resp.ok) {
            console.warn('[auto-update] Failed to fetch version.json:', resp.status);
            return;
          }
          var data = await resp.json();
          var serverVer = data.version;
          var localVer = localStorage.getItem('app-version');
          console.log('[auto-update] Server version:', serverVer, '| Local version:', localVer);
          if (!localVer) {
            console.log('[auto-update] First visit, storing version:', serverVer);
            localStorage.setItem('app-version', serverVer);
            return;
          }
          if (localVer !== serverVer) {
            console.log('[auto-update] Version mismatch! Clearing caches and redirecting...');
            if ('caches' in window) {
              var names = await caches.keys();
              await Promise.all(names.map(function(n) { return caches.delete(n); }));
            }
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r) { return r.unregister(); }));
            }
            if (window.indexedDB && typeof window.indexedDB.databases === 'function') {
              var dbs = await indexedDB.databases();
              dbs.forEach(function(db) { if (db.name) indexedDB.deleteDatabase(db.name); });
            }
            // Force the browser to download fresh copies of critical framework
            // files and update its HTTP cache. Without this, the browser serves
            // stale main.js / dotnet.js from its HTTP cache after the redirect,
            // which in turn loads stale WASM assemblies.
            // Note: dotnet.runtime.*.js and dotnet.native.*.js use fingerprinted
            // filenames (content hash), so they are inherently cache-safe.
            console.log('[auto-update] Pre-fetching fresh framework files...');
            await Promise.allSettled([
              fetch('./main.js', { cache: 'reload' }),
              fetch('./_framework/dotnet.js', { cache: 'reload' }),
            ]);
            console.log('[auto-update] Pre-fetch complete, redirecting...');
            var url = new URL(window.location.href);
            url.searchParams.set('_v', serverVer);
            window.location.replace(url.toString());
          } else {
            console.log('[auto-update] Version is current, no update needed.');
          }
        } catch (e) {
          console.warn('[auto-update] Version check error:', e);
        }
      })();
    </script>
    <script>
      window.addEventListener('message', async function (e) {
        if (e.data && e.data.type !== 'purge-cache') return;

        try {
          // Clear Cache Storage
          if ('caches' in window) {
            var names = await caches.keys();
            await Promise.all(names.map(function (n) { return caches.delete(n); }));
          }

          // Unregister Service Workers
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
          }

          // Clear IndexedDB (Avalonia/.NET WASM may cache assemblies here)
          if (window.indexedDB && typeof window.indexedDB.databases === 'function') {
            var dbs = await indexedDB.databases();
            dbs.forEach(function (db) {
              if (db.name) indexedDB.deleteDatabase(db.name);
            });
          }
        } catch (err) {
          console.warn('purge-cache error:', err);
        }

        // Acknowledge to the parent so it can proceed
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'purge-cache-done' }, '*');
        }
      });
    </script>
    <script type='module' src="./main.js"></script>
</body>

</html>
